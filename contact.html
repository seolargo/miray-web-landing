<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="page.title.contact">Contact – Miray</title>
  <meta name="description" content="Get in touch with Miray. Feedback, ideas, bug reports and partnership inquiries — we read every message."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mirayapp.com/contact.html"/>
  <meta property="og:title" content="Contact – Miray"/>
  <meta property="og:description" content="Feedback, ideas, bugs, partnerships — we read every message."/>
  <meta name="twitter:card" content="summary_large_image"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

  <link rel="icon" type="image/svg+xml" href="/public/logo.svg"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/public/logo.svg"/>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#f04299",
            background: "#fdf2f8",
            card: "#ffffff",
            border: "#fbcfe8",
            muted: "#9d174d"
          },
          fontFamily: {
            display: ["Manrope", "sans-serif"]
          },
          boxShadow: {
            soft: "0 10px 30px rgba(240,66,153,0.15)"
          },
          borderRadius: {
            xl: "1.25rem"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-background text-slate-900 font-display min-h-screen flex flex-col" data-page="contact">

<header id="site-header"></header>

<!-- HERO -->
<section class="max-w-[960px] mx-auto px-6 py-20">
  <h1 class="text-4xl md:text-5xl font-extrabold mb-4">
    <span data-i18n="contact.title">Got Questions?</span>
    <span class="text-primary" data-i18n="contact.title.accent">Ask Miray.</span>
  </h1>

  <p class="text-muted text-lg max-w-xl" data-i18n="contact.subtitle">
    Feedback, ideas, bugs, partnerships — we read every message.
  </p>
</section>

<!-- CONTACT CARD -->
<main class="flex-1 max-w-[960px] mx-auto px-6 pb-20">
  <div class="bg-card border border-border rounded-xl p-8 shadow-soft max-w-md">
    <h2 class="text-xl font-bold mb-6" data-i18n="contact.info.title">
      Contact Information
    </h2>

    <div class="flex flex-col gap-6 text-sm">
      <div>
        <p class="text-muted" data-i18n="contact.info.email">Email</p>
        <a
          href="mailto:mail.omerfaruk@gmail.com"
          class="font-medium text-primary hover:underline"
        >
          mail.omerfaruk@gmail.com
        </a>
      </div>

      <div>
        <p class="text-muted" data-i18n="contact.info.phone">Phone</p>
        <a
          href="tel:+905346963285"
          class="font-medium hover:text-primary"
        >
          +90 (534) 696 32 85
        </a>
      </div>
    </div>
  </div>
</main>

<footer id="site-footer"></footer>

<script src="/js/partials.js" defer></script>
<script src="/js/i18n.js" defer></script>
</body>
</html>
